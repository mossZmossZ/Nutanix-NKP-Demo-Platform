name: Build and Push

# Build both images and push to public Docker Hub on every push to main.
# Deploy is manual (run deploy/deploy.sh on the host) — this is CI, not CD.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME  - Docker Hub username
#   DOCKERHUB_TOKEN     - Docker Hub access token with push scope (NOT the password)

on:
  push:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BACKEND_IMAGE: mosszmossz/nutanix-nkp-workshop-backend
  FRONTEND_IMAGE: mosszmossz/nutanix-nkp-workshop-frontend

jobs:
  # Gate: typecheck + lint + build for BOTH apps. No image is pushed unless this
  # passes, so a break in one app can't publish a mismatched pair. (`npm test` is
  # intentionally excluded — the suite has documented frozen-surface failures.)
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Backend — typecheck, lint, build
        working-directory: backend
        run: |
          npm ci
          npm run typecheck
          npm run lint
          npm run build

      - name: Frontend — typecheck, lint, build
        working-directory: frontend
        run: |
          npm ci
          npm run typecheck
          npm run lint
          npm run build

  build-backend:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-frontend:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short
      - uses: docker/build-push-action@v6
        with:
          # Repo-root context so the Vite build sees the sibling docs-content/.
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
