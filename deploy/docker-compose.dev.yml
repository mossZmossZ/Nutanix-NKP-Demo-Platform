services:
  mongo:
    image: mongo:7.0
    container_name: nkp-mongo-dev
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: devpassword
    healthcheck:
      test: echo 'db.adminCommand("ping")' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nkp-network

  redis:
    image: redis:8.8.0-trixie
    container_name: nkp-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nkp-network

volumes:
  mongo-data:
  redis-data:

networks:
  nkp-network:
    driver: bridge
