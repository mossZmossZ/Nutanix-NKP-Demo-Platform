# Public edge — HTTPS mode. Use this when nginx itself terminates TLS on the host
# (you already have a cert). To activate, mount THIS file to
# /etc/nginx/conf.d/default.conf (instead of app.http.conf) and mount your cert +
# key into /etc/nginx/certs/ (see deploy/docker-compose.prod.yml comments).
#
# Expected cert files (PEM):
#   /etc/nginx/certs/fullchain.pem   (server cert + intermediate chain)
#   /etc/nginx/certs/privkey.pem     (private key)

# Redirect all plain HTTP to HTTPS.
server {
    listen      80;
    listen      [::]:80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    root  /usr/share/nginx/html;
    index index.html;

    # Hardening headers. HSTS is safe here because this server only speaks HTTPS.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff        always;
    add_header X-Frame-Options        SAMEORIGIN     always;
    add_header Referrer-Policy         strict-origin-when-cross-origin always;

    # Runtime backend resolution via Docker DNS (see app.http.conf for rationale).
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $backend "http://backend:4000";

    # WebSocket tunnels: RDP + admin SSH console. Long timeout so sessions persist.
    location /api/ws/ {
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering    off;
    }

    # REST API.
    location /api/ {
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Host      $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Fingerprinted build assets — safe to cache hard.
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # SPA fallback for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
