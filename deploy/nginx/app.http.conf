# Public edge — HTTP mode (default). Use this when TLS is terminated UPSTREAM by an
# external reverse proxy (e.g. a Cloudflare tunnel / cloudflared), so the browser
# still sees HTTPS end-to-end. nginx itself listens on plain HTTP on the local IP.
#
# Mount this file to /etc/nginx/conf.d/default.conf (compose does this by default).
# For direct TLS on the host instead, mount app.https.conf here and remove this one.

server {
    listen      80;
    listen      [::]:80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Cheap, universally-safe hardening headers.
    add_header X-Content-Type-Options nosniff        always;
    add_header X-Frame-Options        SAMEORIGIN     always;
    add_header Referrer-Policy         strict-origin-when-cross-origin always;

    # Resolve the backend service via Docker's embedded DNS at request time, so
    # nginx starts even if the backend container isn't up yet and follows its IP
    # across restarts. The variable proxy_pass forces this runtime resolution.
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $backend "http://backend:4000";

    # WebSocket tunnels: RDP (guacamole-lite) and the admin SSH console. These must
    # allow the HTTP/1.1 Upgrade handshake and stay open far longer than the 60s
    # default, or a live desktop/terminal session drops mid-use.
    location /api/ws/ {
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Behind a CF tunnel the external scheme is always HTTPS.
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering    off;
    }

    # REST API.
    location /api/ {
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Host      $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    # Fingerprinted build assets — safe to cache hard.
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # SPA: serve the file if it exists, else fall back to index.html for
    # client-side (React Router) routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
