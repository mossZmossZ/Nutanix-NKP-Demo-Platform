# Main nginx config for the public edge (frontend image). Bind-mounted over
# /etc/nginx/nginx.conf in compose so tuning changes never require an image rebuild.
# The active server block (HTTP or HTTPS) is mounted separately into conf.d/.

user  nginx;
worker_processes  auto;
worker_rlimit_nofile  65535;

events {
    worker_connections  8192;   # headroom for many concurrent RDP/SSH WebSockets
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens   off;         # don't advertise the nginx version

    # Lab import (POST /api/admin/labs/import) carries up to ~2mb of JSON; the
    # backend Express limit is 2mb, so give the proxy headroom (default is 1m).
    client_max_body_size  4m;

    # Derive the Connection header for WebSocket upgrades: "upgrade" when the
    # client requests it, otherwise "close". Used by the /api/ws/ locations.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_types        application/javascript application/json application/xml
                      text/css text/plain text/javascript image/svg+xml
                      application/wasm font/woff font/woff2;

    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log warn;

    # The active server block (app.http.conf or app.https.conf) is mounted here.
    include /etc/nginx/conf.d/*.conf;
}
